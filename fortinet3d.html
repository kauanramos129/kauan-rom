<!DOCTYPE html>
<html>
<head>
    <title>FORTINET 3D - Battle Royale</title>
    <style>
        body { margin: 0; background: #0a0a0a; font-family: Arial; overflow: hidden; }
        #game { position: relative; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white; 
            font-size: 20px; font-weight: bold; z-index: 100;
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 20px; margin: -10px 0 0 -10px;
            border: 2px solid #00ff00; border-radius: 50%; z-index: 100;
        }
        #minimap { 
            position: absolute; top: 10px; right: 10px; 
            width: 200px; height: 200px; background: rgba(0,0,0,0.8);
            border: 2px solid #00ff00; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="ui">
            <div>❤️ HP: <span id="health">100</span> | 🛡️ Shield: <span id="shield">50</span></div>
            <div>🔫 <span id="weapon">Pistol</span> | 💰 <span id="cash">0</span></div>
            <div id="victory" style="font-size: 40px; color: gold; display: none;">VICTORY ROYALE! 🏆</div>
        </div>
        <div id="crosshair"></div>
        <canvas id="minimap"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 🎮 FORTINET 3D ENGINE
        class Fortinet3D {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.getElementById('game').appendChild(this.renderer.domElement);
                
                // Player Stats
                this.health = 100;
                this.shield = 50;
                this.cash = 0;
                this.weapon = 'Pistol';
                this.ammo = 30;
                this.position = { x: 0, y: 5, z: 0 };
                this.rotation = 0;
                
                // Game World
                this.enemies = [];
                this.buildings = [];
                this.loot = [];
                this.safewone = { x: 0, y: 0, r: 50 };
                this.stormTime = 300; // 5min
                
                this.init();
                this.animate();
                this.setupControls();
                this.generateWorld();
            }
            
            init() {
                // Lighting
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                this.scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(50, 50, 50);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);
                
                // Skybox
                const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
                const skyMaterial = new THREE.MeshBasicMaterial({
                    color: 0x87CEEB,
                    side: THREE.BackSide
                });
                this.scene.add(new THREE.Mesh(skyGeometry, skyMaterial));
                
                this.camera.position.set(0, 5, 10);
            }
            
            generateWorld() {
                // Ground
                const groundGeo = new THREE.PlaneGeometry(200, 200);
                const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c59 });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);
                
                // Random Buildings
                for(let i = 0; i < 20; i++) {
                    this.addBuilding(
                        (Math.random() - 0.5) * 150,
                        (Math.random() - 0.5) * 150
                    );
                }
                
                // Loot Chests
                for(let i = 0; i < 15; i++) {
                    this.addLootChest(
                        (Math.random() - 0.5) * 120,
                        (Math.random() - 0.5) * 120
                    );
                }
                
                // Enemies
                for(let i = 0; i < 5; i++) {
                    this.spawnEnemy();
                }
            }
            
            addBuilding(x, z) {
                const height = Math.random() * 8 + 2;
                const geometry = new THREE.BoxGeometry(8, height, 8);
                const material = new THREE.MeshLambertMaterial({ 
                    color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.5, 0.7, 0.5)
                });
                const building = new THREE.Mesh(geometry, material);
                building.position.set(x, height/2, z);
                building.castShadow = true;
                building.receiveShadow = true;
                building.userData = { type: 'building', health: 100 };
                this.scene.add(building);
                this.buildings.push(building);
            }
            
            addLootChest(x, z) {
                const geometry = new THREE.BoxGeometry(2, 1.5, 2);
                const material = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                const chest = new THREE.Mesh(geometry, material);
                chest.position.set(x, 0.75, z);
                chest.userData = { type: 'chest', looted: false };
                this.scene.add(chest);
                this.loot.push(chest);
            }
            
            spawnEnemy() {
                const enemy = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.5, 1.5),
                    new THREE.MeshLambertMaterial({ color: 0xff4444 })
                );
                enemy.position.set(
                    (Math.random() - 0.5) * 100,
                    1,
                    (Math.random() - 0.5) * 100
                );
                enemy.userData = { 
                    type: 'enemy', 
                    health: 75, 
                    shield: 25,
                    damage: 15 
                };
                this.scene.add(enemy);
                this.enemies.push(enemy);
            }
            
            setupControls() {
                const keys = {};
                document.addEventListener('keydown', (e) => keys[e.code] = true);
                document.addEventListener('keyup', (e) => keys[e.code] = false);
                
                // Mouse Look
                let mouseX = 0, mouseY = 0;
                document.addEventListener('mousemove', (e) => {
                    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
                    this.camera.rotation.y = mouseX * 0.3;
                    this.camera.rotation.x = mouseY * 0.3;
                });
                
                // Game Loop Input
                const loop = () => {
                    const speed = 0.5;
                    if(keys['KeyW']) this.position.z -= speed;
                    if(keys['KeyS']) this.position.z += speed;
                    if(keys['KeyA']) this.position.x -= speed;
                    if(keys['KeyD']) this.position.x += speed;
                    if(keys['Space']) this.position.y = Math.min(10, this.position.y + 0.3);
                    
                    // Gravity
                    if(this.position.y > 1) this.position.y -= 0.2;
                    
                    // Shoot
                    if(keys['KeyF']) this.shoot();
                    
                    // Build
                    if(keys['KeyQ']) this.build('wall');
                    if(keys['KeyW']) this.build('ramp');
                    if(keys['KeyE']) this.build('floor');
                    
                    requestAnimationFrame(loop);
                };
                loop();
            }
            
            shoot() {
                if(this.ammo <= 0) return;
                this.ammo--;
                
                // Raycast
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), this.camera);
                const intersects = raycaster.intersectObjects(this.scene.children);
                
                if(intersects.length > 0) {
                    const hit = intersects[0].object;
                    if(hit.userData.type === 'enemy') {
                        hit.userData.health -= 25;
                        if(hit.userData.health <= 0) {
                            this.scene.remove(hit);
                            this.enemies = this.enemies.filter(e => e !== hit);
                            this.cash += 100;
                            if(this.enemies.length === 0) {
                                document.getElementById('victory').style.display = 'block';
                            }
                        }
                    }
                }
                
                // Muzzle Flash Effect
                const flash = new THREE.PointLight(0xffff00, 2, 10);
                flash.position.copy(this.camera.position);
                this.scene.add(flash);
                setTimeout(() => this.scene.remove(flash), 50);
            }
            
            build(type) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshLambertMaterial({ color: 0x666666 });
                const block = new THREE.Mesh(geometry, material);
                
                // Place in front of player
                const direction = new THREE.Vector3(0, 0, -1);
                direction.applyQuaternion(this.camera.quaternion);
                block.position.copy({
                    x: this.position.x + direction.x,
                    y: this.position.y + 1,
                    z: this.position.z + direction.z
                });
                
                block.userData = { type: 'build', health: 50 };
                this.scene.add(block);
                this.buildings.push(block);
            }
            
            updateUI() {
                document.getElementById('health').textContent = this.health;
                document.getElementById('shield').textContent = this.shield;
                document.getElementById('cash').textContent = this.cash;
                document.getElementById('weapon').textContent = this.weapon;
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                // Update camera position
                this.camera.position.set(
                    this.position.x, 
                    this.position.y + 2, 
                    this.position.z + 5
                );
                
                // Rotate enemies
                this.enemies.forEach(enemy => {
                    enemy.rotation.y += 0.02;
                    // Move toward player
                    const dx = this.position.x - enemy.position.x;
                    const dz = this.position.z - enemy.position.z;
                    enemy.position.x += dx * 0.01;
                    enemy.position.z += dz * 0.01;
                });
                
                this.renderer.render(this.scene, this.camera);
                this.updateUI();
            }
        }
        
        // 🚀 START GAME
        window.addEventListener('load', () => {
            new Fortinet3D();
        });
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
